
<p-toast position="top-center" key="confirm"  [baseZIndex]="5000">
  <ng-template let-message #headless let-closeFn="closeFn">
    <section class="flex flex-col p-4 gap-4 w-full bg-primary/70 rounded-xl">
      <div class="flex items-center gap-5">
        <i class="pi pi-cloud-upload text-white dark:text-black text-2xl"></i>
        <span class="font-bold text-base text-white dark:text-black">{{ message.summary }}</span>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-sm font-bold text-white dark:text-black"> uploaded</label>
      </div>
      <div class="flex gap-4 mb-4 justify-end">
      </div>
    </section>
  </ng-template>
</p-toast>
<form [formGroup]="form" class="kt-card-content flex flex-col gap-5 p-10" (ngSubmit)="handleSubmit()">
  <div class="text-center mb-2.5">
    <h3 class="text-lg font-medium text-mono leading-none mb-2.5">
      Sign in
    </h3>
    <div class="flex items-center justify-center font-medium">
       <span class="text-sm text-secondary-foreground me-1.5">
        Need an account?
       </span>
      <a class="text-sm link" routerLink="/auth/sign-up">
        Sign up
      </a> 
    </div>
  </div>
  <div class="flex flex-col gap-1">
    <label class="kt-form-label font-normal text-mono">
      Email
    </label>
    <input class="kt-input" formControlName="email" placeholder="email@email.com" type="text" value=""/>
    <app-form-error-label [control]="form.get('email')" />
  </div>
  <div class="flex flex-col gap-1">
    <div class="flex items-center justify-between gap-1">
      <label class="kt-form-label font-normal text-mono">
        Password
      </label>
      <a class="text-sm kt-link shrink-0">
        Forgot Password?
      </a>
    </div>
    <div class="kt-input" data-kt-toggle-password="true">
      <input formControlName="password" placeholder="Enter Password" type="password" value=""/>
      <button class="kt-btn kt-btn-sm kt-btn-ghost kt-btn-icon bg-transparent! -me-1.5" data-kt-toggle-password-trigger="true" type="button">
        <span class="kt-toggle-password-active:hidden">
         <i class="ki-filled ki-eye text-muted-foreground">
         </i>
        </span>
        <span class="hidden kt-toggle-password-active:block">
         <i class="ki-filled ki-eye-slash text-muted-foreground"></i>
        </span>
      </button>
    </div>
    <app-form-error-label [control]="form.get('password')" />
  </div>
  <label class="kt-label">
    <input class="kt-checkbox kt-checkbox-sm" name="check" type="checkbox" value="1"/>
    <span class="kt-checkbox-label">
     Remember me
    </span>
  </label>
  <button class="kt-btn kt-btn-primary flex justify-center grow">
    Sign In
  </button>
</form>
