  <div class="flex items-center justify-between group cursor-pointer w-full">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 transition-colors" [class]="colorClasses()">
        <i class="ki-filled {{icon()}}"></i>
      </div>
      <div>
        <p class="text-sm font-medium text-slate-900 line-clamp-1">{{transaction().note || transaction().payer || 'Sin descripción'}}</p>
        <div class="flex items-center gap-2 text-xs text-slate-500 mt-0.5">
          <span>{{typeName()}}</span>
          <span>•</span>
          <span>{{transaction().date | date:'short'}}</span>
        </div>
      </div>
    </div>
    <div 
        class="text-sm font-semibold whitespace-nowrap" 
        [class]="transaction().amount < 0 ? 'text-red-500' : 'text-green-600'">
      {{transaction().amount | currency}}
    </div>
  </div>
